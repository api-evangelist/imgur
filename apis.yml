aid: imgur
name: Imgur
description: >-
  Imgur is a popular image and album hosting platform whose REST API (v3) exposes the full platform — upload, retrieve,
  vote, comment, gallery, account, tags, topics — over HTTP/JSON. Anonymous reads/writes are supported with a Client-ID;
  per-user actions use OAuth2 access tokens. Commercial use is routed through RapidAPI's metered tiers.
url: https://apidocs.imgur.com/
image: https://s.imgur.com/images/favicon-152.png
specificationVersion: '0.20'
type: API
created: '2026-05-28'
modified: '2026-05-30'
x-source: public-apis/public-apis
x-category: Photography
x-tier: 2
x-tier-reason: pipeline-enriched
tags:
