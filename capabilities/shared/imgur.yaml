apiVersion: naftiko.dev/v1alpha1
kind: CapabilityCollection
metadata:
  name: imgur
  title: Imgur API Capabilities
  description: Shared capability primitives sourced from the Imgur API v3 (image, album, gallery, comment, account, tags).
  api: imgur
spec:
  baseURL: https://api.imgur.com
  authentication:
    - id: imgur-client-id
      type: apiKey
      in: header
      name: Authorization
      valueTemplate: "Client-ID {{ env.IMGUR_CLIENT_ID }}"
      description: Anonymous access using Imgur Client-ID.
    - id: imgur-oauth2
      type: oauth2
      flow: authorizationCode
      tokenUrl: https://api.imgur.com/oauth2/token
      authorizationUrl: https://api.imgur.com/oauth2/authorize
      description: User-scoped OAuth2 access tokens.

  capabilities:
    - id: upload-image
      title: Upload Image
      description: Upload an image as binary, base64, or remote URL; optionally attach to an album.
      operationRef: uploadImage
      method: POST
      path: /3/image
      auth: imgur-client-id
      cost: { credits: 10, dailyQuotaKey: uploads }

    - id: get-image
      title: Get Image
      description: Retrieve metadata for an image by its hash.
      operationRef: getImage
      method: GET
      path: /3/image/{imageHash}
      auth: imgur-client-id

    - id: delete-image
      title: Delete Image
      description: Delete an image. OAuth2 token (or matching deletehash) required.
      operationRef: deleteImage
      method: DELETE
      path: /3/image/{imageHash}
      auth: imgur-oauth2

    - id: favorite-image
      title: Favorite Image
      description: Toggle the authenticated user's favorite status on an image.
      operationRef: favoriteImage
      method: POST
      path: /3/image/{imageHash}/favorite
      auth: imgur-oauth2

    - id: create-album
      title: Create Album
      description: Create a new album, optionally with starting image IDs.
      operationRef: createAlbum
      method: POST
      path: /3/album
      auth: imgur-oauth2

    - id: get-album
      title: Get Album
      description: Retrieve metadata for an album, including its images.
      operationRef: getAlbum
      method: GET
      path: /3/album/{albumHash}
      auth: imgur-client-id

    - id: update-album
      title: Update Album
      description: Update album title, description, image list, privacy, layout, or cover.
      operationRef: updateAlbum
      method: PUT
      path: /3/album/{albumHash}
      auth: imgur-oauth2

    - id: browse-gallery
      title: Browse Public Gallery
      description: Page through Imgur's public gallery by section, sort, and window.
      operationRef: getGallery
      method: GET
      path: /3/gallery/{section}/{sort}/{window}/{page}
      auth: imgur-client-id

    - id: search-gallery
      title: Search Public Gallery
      description: Full-text search the public gallery.
      operationRef: searchGallery
      method: GET
      path: /3/gallery/search
      auth: imgur-client-id

    - id: vote-on-gallery-item
      title: Vote On Gallery Item
      description: Cast or retract an up/down/veto vote on a gallery item.
      operationRef: voteGalleryItem
      method: POST
      path: /3/gallery/{galleryHash}/vote/{vote}
      auth: imgur-oauth2

    - id: create-comment
      title: Create Comment
      description: Post a new comment on a gallery image or album.
      operationRef: createComment
      method: POST
      path: /3/comment
      auth: imgur-oauth2

    - id: get-account
      title: Get Account
      description: Retrieve a public account profile by username.
      operationRef: getAccount
      method: GET
      path: /3/account/{username}
      auth: imgur-client-id

    - id: get-account-images
      title: List Account Images
      description: List images owned by the authenticated account.
      operationRef: getAccountImages
      method: GET
      path: /3/account/{username}/images
      auth: imgur-oauth2

    - id: get-rate-limit-credits
      title: Read Rate Limit Credits
      description: Return remaining client and user credits in the current window.
      operationRef: getRateLimitCredits
      method: GET
      path: /3/credits
      auth: imgur-client-id
